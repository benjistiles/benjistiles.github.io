    <main class="container">
        <section id="shows" class="shows-section">
            <div class="show-list" id="showList" aria-live="polite"></div>
        </section>

        <div id="showModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
            <div class="modal-backdrop"></div>
            <div class="modal-dialog">
                <button class="modal-close" aria-label="Close show details">&times;</button>
                <button id="modalCalendarBtn" class="modal-calendar-btn" type="button" aria-label="Add to calendar"><i class="fas fa-calendar-plus"></i></button>
                <div class="modal-content">
                    <div class="modal-header">
                        <span class="show-label" id="modalCategoryLabel"></span>
                        <h2 id="modalTitle"></h2>
                        <time id="modalDate"></time>
                    </div>
                    <div class="modal-body">
                        <p id="modalDetails" class="show-details"></p>
                        <div class="modal-section">
                            <h3>Personnel</h3>
                            <p id="modalPersonnel">Band members and collaborators go here.</p>
                        </div>
                        <div class="modal-section">
                            <h3>Address</h3>
                            <p id="modalAddress">Venue address or location details.</p>
                        </div>
                        <div class="modal-section">
                            <h3>Notes</h3>
                            <p id="modalNotes">Additional show information can be added here.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-socials">
            <a href="https://www.facebook.com/profile.php?id=100078161373243" target="_blank"><i class="fab fa-facebook"></i></a>

            <a href="https://www.linkedin.com/in/benji-stiles-345a06284/" target="_blank"><i class="fab fa-linkedin"></i></a>
        </div>
        <p class="footer-text">&copy; 2026 Benji Stiles. All Rights Reserved.</p>
    </footer>

    <script>
        const navToggle = document.getElementById('navToggle');
        const navLinks = document.getElementById('navLinks');

        navToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        const showData = [
            {
                date: 'May 15, 2026',
                datetime: '2026-05-15',
                startTime: '7:00 PM',
                title: 'Grey and Gray @ Poe Mill',
                details: 'Poe Mill Music • Jazz Fusion • $15 cover',
                personnel: 'Evan Grey – guitar, drums; Dalvin Gray – drums; Michael Ford – guitar; Nathan Fowler – guitar; Harper Krimm – vocals; Silas Cain – vocals; Benji Stiles – bass;',
                address: '904 Pinckney St, Greenville, SC 29609',
            },
            {
                date: 'May 3, 2026',
                datetime: '2026-05-03',
                startTime: '3:00 PM',
                title: 'Anderson Symphony Orchestra - Happy 250th, USA!',
                details: 'Henderson Auditorium',
                notes: "Celebrate America’s 250th birthday with a rousing symphony concert filled patriotic favorites, honoring the nation’s journey through sound. Tickets available at the door or by phone at (864)-231-6147."
            },
            {

                title: 'Blackwood Jazz @ Entre Nous',

                address: 'Maestro Bistro & Dinner Club 104 S Main St, Unit 105, Greenville, SC 29601',
                notes: "Come on out and really see what is 'behind the bookcase' at Greenville's most unique speakeasy! Please call (864)-248-0702 to make your reservations. Proper attire highly encouraged, ages 21+."
            },
            {
                date: 'April 29, 2026',
                datetime: '2026-04-29',
                startTime: '7:00 PM',
                title: 'AU Jazz Combo',
                details: 'Daniel Recital Hall',
                personnel: 'Harper Krimm – vocals; Dalvin Gray – drums; Nathan Freeman – trumpet; Logan Burgess – alto & soprano sax; Rose Wilson – piano; Max Dubnick – guitar; Benji Stiles – bass',
                notes: "The Anderson University Jazz Combo will be performing a set of swingin' tunes in the Daniel Recital Hall as part of the Anderson University Concert Series. Free and open to the public!"
            },
            {
                date: 'April 25, 2026',
                datetime: '2026-04-25',
                startTime: '12:00 PM',
                title: 'AU Jazz Combo @ Soirée',
                details: 'SCSA Soirée Stage',
                personnel: 'Harper Krimm – vocals; Dalvin Gray – drums; Nathan Freeman – trumpet; Logan Burgess – alto & soprano sax; Rose Wilson – piano; Max Dubnick – guitar; Benji Stiles – bass',
                address: 'SCSA Soirée Stage, Downtown Anderson, SC',
                notes: "The Anderson University Jazz Combo will be performing a set of swingin' tunes at the Annual Anderson Soirée. Free and open to the public- come on out and enjoy the festivities!"
            },
            {
                date: 'April 24, 2026',
                datetime: '2026-04-24',
                startTime: '6:00 PM',
                title: 'Songwriter Showcase: Audio 316 Records',
                details: 'SCSA Soirée Stage',
                personnel: 'Harper Krimm – vocals; Benji Stiles – bass',
                address: 'SCSA Soirée Stage, Downtown Anderson, SC',
                notes: 'A showcase of original music from Audio 316 Records at the Annual Anderson Soirée. Benji will be performing with the songwriter and vocalist Harper Krimm. Free and open to the public!'
            },
            {
                date: 'April 18, 2026',
                datetime: '2026-04-18',
                startTime: '3:00 PM',
                title: 'Nathan Freeman and The Horn Brothers',
                details: 'Daniel Recital Hall • Jazz/Fusion, Classical',
                personnel: 'Janice Wright – piano; Nathan Freeman – trumpet; Rose Wilson – piano; Olivia Burdette – organ; Benji Stiles – bass; Dalvin Gray – drums; Evan Grey – guitar;',
                address: 'Daniel Recital Hall, Anderson University, Anderson, SC',
                notes: 'A showcase of the work from the wonderful trumpeter, Nathan Freeman. Free and open to the public!'
            },
            {
                date: 'April 19, 2026',
                datetime: '2026-04-19',
                startTime: '7:30 PM',
                title: 'Grey and Gray',
                details: 'Daniel Recital Hall • Jazz Fusion',
                personnel: 'Evan Grey – guitar, drums; Dalvin Gray – drums; Michael Ford – guitar; Nathan Fowler – guitar; Harper Krimm – vocals; Silas Cain – vocals; Benji Stiles – bass;',
                address: 'Daniel Recital Hall, Anderson University, Anderson, SC',
                notes: 'Free and open to the public!'
            },
            {
                date: 'May 22, 2026',
                datetime: '2026-05-22',
                endDate: 'May 24, 2026',
                endDatetime: '2026-05-24',
                title: 'Audio 316 Recording Sessions',
                address: 'Nashville, TN',
                notes: "I'll be traveling to Nashville to record with a couple of great musicians and friends. We'll be working on some original music and covers for release later this year. Follow along on social media for updates and sneak peeks from the studio!"
            },

        ];

        const today = new Date();
        today.setHours(0,0,0,0);

        const showList = document.getElementById('showList');
        const modal = document.getElementById('showModal');
        const modalCategoryLabel = document.getElementById('modalCategoryLabel');
        const modalTitle = document.getElementById('modalTitle');
        const modalDate = document.getElementById('modalDate');
        const modalCalendarBtn = document.getElementById('modalCalendarBtn');
        const modalBody = document.querySelector('.modal-body');
        const modalClose = document.querySelector('.modal-close');
        const modalBackdrop = document.querySelector('.modal-backdrop');
        let activeCalendarShow = null;

        function parseStartTimeTo24(startTime) {
            const match = String(startTime).match(/(\d{1,2})(?::(\d{2}))?\s*(AM|PM)/i);
            if (!match) {
                return '23:59';
            }
            let hour = Number(match[1]);
            const minute = Number(match[2] || '0');
            const meridiem = match[3].toUpperCase();
            if (meridiem === 'PM' && hour !== 12) hour += 12;
            if (meridiem === 'AM' && hour === 12) hour = 0;
            return `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`;
        }

        function getShowStartDateTime(show) {
            const time24 = parseStartTimeTo24(show.startTime || show.details);
            return new Date(`${show.datetime}T${time24}:00`);
        }

        function getShowEndDateTime(show) {
            if (show.endDatetime) {
                const time24 = parseStartTimeTo24(show.startTime || show.details);
                return new Date(`${show.endDatetime}T${time24}:00`);
            }
            return getShowStartDateTime(show);
        }

        const now = new Date();
        const sortedShows = showData
            .map(show => ({ ...show, showStartDateTime: getShowStartDateTime(show), showEndDateTime: getShowEndDateTime(show) }))
            .sort((a, b) => a.showEndDateTime - b.showEndDateTime);

        const pastShows = sortedShows.filter(show => show.showEndDateTime < now);
        const upcomingShows = sortedShows.filter(show => show.showEndDateTime >= now);

        function getShowStatus(show) {
            const fourHoursInMs = 4 * 60 * 60 * 1000;
            const timeSinceStart = now - show.showStartDateTime;
            const timeUntilEnd = show.showEndDateTime - now;

            if (show.endDatetime) {
                const startDate = new Date(show.datetime);
                const endDate = new Date(show.endDatetime);
                if (today >= startDate && today <= endDate) {
                    return 'now';
                }
            }

            // Show has started but end hasn't passed
            if (timeSinceStart >= 0) {
                // Check if we're within 4 hours of the end time
                if (timeUntilEnd >= 0 && timeUntilEnd <= fourHoursInMs) {
                    return 'now';
                }
                // If show has ended, but less than 4 hours have passed since it ended
                if (timeUntilEnd < 0 && Math.abs(timeUntilEnd) <= fourHoursInMs) {
                    return 'now';
                }

            }

            return show.showEndDateTime < now ? 'past' : 'upcoming';
        }

        const nowShows = sortedShows.filter(show => getShowStatus(show) === 'now');
        const pastShowsFiltered = sortedShows.filter(show => getShowStatus(show) === 'past');
        const upcomingShowsFiltered = sortedShows.filter(show => getShowStatus(show) === 'upcoming');

        function formatPersonnelList(personnel) {
            const parts = (personnel || '')
                .split(';')
                .map(item => item.trim())
                .filter(Boolean);

            if (!parts.length) {
                return null;
            }

            const items = parts.map(item => `<li>${item}</li>`).join('');
            return `<div class="modal-section"><h3>Personnel</h3><ul class="personnel-list">${items}</ul></div>`;
        }

        function createModalSection(title, content) {
            return `<div class="modal-section"><h3>${title}</h3><p>${content}</p></div>`;
        }

        function getEventDetailsText(show) {
            const details = show.details ? show.details.trim() : '';
            if (show.startTime && details) {
                return `${show.startTime} • ${details}`;
            }
            return show.startTime || details || '';
        }

        function formatIcsDate(show, end = false) {
            let dateStr, timeStr;
            
            if (end && show.endDatetime) {
                dateStr = show.endDatetime.replace(/-/g, '');
                const time24 = parseStartTimeTo24(show.startTime).replace(':', '');
                const hour = Number(time24.slice(0, 2));
                const minute = Number(time24.slice(2));
                const dateObj = new Date(`${show.endDatetime}T${time24.slice(0,2)}:${time24.slice(2)}:00`);
                dateObj.setMinutes(dateObj.getMinutes() + 90);
                return dateObj.toISOString().replace(/[-:]/g, '').split('.')[0];
            }
            
            dateStr = show.datetime.replace(/-/g, '');
            if (!show.startTime) {
                return `${dateStr}`;
            }
            const time24 = parseStartTimeTo24(show.startTime).replace(':', '');
            return `${dateStr}T${time24}00`;
        }

        function sanitizeIcsText(value) {
            return String(value || '')
                .replace(/\\/g, '\\\\')
                .replace(/\n/g, '\\n')
                .replace(/,/g, '\\,')
                .replace(/;/g, '\\;');
        }

        function createIcsContent(show) {
            const dtStart = formatIcsDate(show);
            const dtEnd = show.startTime ? formatIcsDate(show, true) : formatIcsDate(show);
            const uid = `event-${Date.now()}-${Math.random().toString(36).slice(2)}@benjistiles.com`;
            const description = sanitizeIcsText([show.details, show.notes].filter(Boolean).join(' \n '));
            const location = sanitizeIcsText(show.address || '');

            return `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Benji Stiles//Shows//EN\r\nBEGIN:VEVENT\r\nUID:${uid}\r\nDTSTAMP:${new Date().toISOString().replace(/[-:]/g, '').split('.')[0]}Z\r\nSUMMARY:${sanitizeIcsText(show.title)}\r\nDTSTART:${dtStart}\r\nDTEND:${dtEnd}\r\n${location ? `LOCATION:${location}\r\n` : ''}${description ? `DESCRIPTION:${description}\r\n` : ''}END:VEVENT\r\nEND:VCALENDAR`;
        }

        function downloadCalendarEvent(show) {
            const icsContent = createIcsContent(show);
            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${show.title.replace(/[^a-z0-9]+/gi, '-').replace(/(^-|-$)/g, '') || 'event'}.ics`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function openShowModal(status, index) {
            let show;
            if (status === 'now') {
                show = nowShows[index];
            } else if (status === 'past') {
                show = pastShowsFiltered[index];
            } else {
                show = upcomingShowsFiltered[index];
            }
            if (!show) return;
            activeCalendarShow = show;
            
            const statusDisplay = status === 'now' ? 'Now' : (status === 'past' ? 'Past' : 'Upcoming');
            modalCategoryLabel.textContent = statusDisplay;
            modalTitle.textContent = show.title;
            const dateDisplay = show.endDate ? `${show.date} – ${show.endDate}` : show.date;
            modalDate.textContent = dateDisplay;
            modalCalendarBtn.disabled = false;

            let bodyHtml = `<p class="show-details">${getEventDetailsText(show)}</p>`;

            const personnelHtml = formatPersonnelList(show.personnel);
            if (personnelHtml) {
                bodyHtml += personnelHtml;
            }

            if (show.address && show.address.trim()) {
                bodyHtml += createModalSection('Address', show.address);
            }

            if (show.notes && show.notes.trim()) {
                bodyHtml += createModalSection('Notes', show.notes);
            }

            modalBody.innerHTML = bodyHtml;
            modal.classList.add('active');
            modal.setAttribute('aria-hidden', 'false');
        }

        function closeModal() {
            modal.classList.remove('active');
            modal.setAttribute('aria-hidden', 'true');
        }

        function createShowItem(show, status, index) {
            const article = document.createElement('article');
            article.className = 'show-item';
            article.tabIndex = 0;
            article.dataset.status = status;
            article.dataset.index = index;

            const dateDisplay = show.endDate ? `${show.date} – ${show.endDate}` : show.date;
            const statusDisplay = status === 'now' ? 'Now' : (status === 'past' ? 'Past' : 'Upcoming');

            article.innerHTML = `
                <span class="show-label">${statusDisplay}</span>
                <time datetime="${show.datetime}">${dateDisplay}</time>
                <h3>${show.title}</h3>
                <p class="show-details">${getEventDetailsText(show)}</p>
            `;

            article.addEventListener('click', () => openShowModal(status, index));
            article.addEventListener('keydown', event => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    openShowModal(status, index);
                }
            });

            return article;
        }

        function createEmptyState(message) {
            const emptyItem = document.createElement('div');
            emptyItem.className = 'show-empty';
            emptyItem.innerHTML = `<p>${message}</p>`;
            return emptyItem;
        }

        function createTodayBarrier() {
            const barrier = document.createElement('div');
            barrier.className = 'today-barrier';
            const formattedToday = today.toLocaleDateString('en-US', {
                month: 'long',
                day: 'numeric',
                year: 'numeric'
            });
            barrier.innerHTML = `<span>Today</span><span>${formattedToday}</span>`;
            return barrier;
        }

        function renderShowList() {
            showList.innerHTML = '';

            // Past shows (filtered to exclude "now" and upcoming)
            if (pastShowsFiltered.length) {
                pastShowsFiltered.forEach((show, index) => {
                    showList.appendChild(createShowItem(show, 'past', index));
                });
            } else {
                showList.appendChild(createEmptyState('No past shows are available yet.'));
            }

            showList.appendChild(createTodayBarrier());

            // Now shows (started recently or within the 4-hour window)
            if (nowShows.length) {
                nowShows.forEach((show, index) => {
                    showList.appendChild(createShowItem(show, 'now', index));
                });
            }

            // Upcoming shows (filtered to exclude "now")
            if (upcomingShowsFiltered.length) {
                upcomingShowsFiltered.forEach((show, index) => {
                    showList.appendChild(createShowItem(show, 'upcoming', index));
                });
            } else {
                showList.appendChild(createEmptyState('No upcoming shows are scheduled at this time.'));
            }
        }

        renderShowList();

        modalCalendarBtn.addEventListener('click', event => {
            event.stopPropagation();
            if (activeCalendarShow) {
                downloadCalendarEvent(activeCalendarShow);
            }
        });

        modalClose.addEventListener('click', closeModal);
        modalBackdrop.addEventListener('click', closeModal);
        document.addEventListener('keydown', event => {
            if (event.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
